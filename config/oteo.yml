# Configuración de dominio de Oteo (ADR-003 / ADR-006 / ADR-008).
# Vive en configuración, no en código: se ajusta sin tocar clasificadores.
# CASES.md es la memoria de por qué cada dominio está en estas listas.

shared:
  # Dominios que cuentan como "solo redes", no web propia (ADR-003).
  # Un URI que matchea aquí => digital_presence: solo_redes.
  social_domains:
    - facebook.com
    - fb.com
    - fb.me
    - m.facebook.com
    - instagram.com
    - instagr.am
    - linktr.ee
    - linktree.com
    - wa.me
    - api.whatsapp.com
    - chat.whatsapp.com
    - tiktok.com
    - twitter.com
    - x.com
    - youtube.com
    - beacons.ai
    - wa.link # landing de WhatsApp tipo linktr.ee (CASES.md 2026-07-08)
    # Segunda auditoría del populate del Maule — link-in-bio / WhatsApp / listado Google (CASES.md 2026-07-08)
    - bio.site
    - bio.link
    - linkinsta.com
    - msha.ke
    - w.app # landing de WhatsApp
    - g.page # link corto al Perfil de Empresa de Google (no es web propia)

  # Agregadores de delivery y catálogos de terceros (ADR-003): también solo_redes.
  # Excelente lead: ya pagan comisión por existir online.
  aggregator_domains:
    - pedidosya.cl
    - pedidosya.com
    - rappi.cl
    - rappi.com
    - ubereats.com
    - justo.cl
    - fudo.cl
    - fresha.com # plataforma de reservas (peluquerías/spa) — CASES.md 2026-07-08
    # Segunda auditoría del populate del Maule — directorios y agregadores de viaje (CASES.md 2026-07-08)
    - mercantil.com # directorio de empresas B2B (3 negocios)
    - booking.com
    - tripadvisor.com
    - tripadvisor.com.ar
    - tripadvisor.com.pe

  # Constructores de sitios y plataformas de menú/QR de terceros: el SUBDOMINIO POR DEFECTO
  # de una plataforma plantilla no es web propia (ADR-003), es lead. Detectados en el sync
  # real de Curicó (ver CASES.md, 2026-07-07: ueniweb.com, horecaqr.com). Si el negocio usa
  # la plataforma con su propio dominio .cl, eso NO matchea aquí y cuenta como web_propia.
  site_builder_domains:
    - ueniweb.com
    - horecaqr.com
    - fu.do # plataforma de menús/gestión para restaurantes (CASES.md 2026-07-08)
    - pedix.app # plataforma de pedidos online (CASES.md 2026-07-08)
    - pedixwpp.com # variante WhatsApp de Pedix (CASES.md 2026-07-08)
    # Segunda auditoría del populate del Maule — plataformas de plantilla/menú/reserva y
    # contenido alojado por terceros. El subdominio por defecto NO es web propia (CASES.md 2026-07-08).
    - agendapro.com # SaaS de reservas para peluquerías/barberías (9 negocios)
    - toteat.app # gestión/menú de restaurantes (Chile)
    - ola.click # pedidos online (Chile)
    - oddmenu.com # menú digital
    - restomovil.com # landing/carta de restaurantes
    - kyte.site # catálogo/tienda plantilla
    - skedu.com # reservas
    - heygoldie.com # reservas (barberías)
    - webnode.com
    - webnode.es
    - wordpress.com # subdominio gratuito (WordPress propio con dominio .cl NO matchea)
    - github.io # GitHub Pages
    - drive.google.com # archivo alojado (carta en PDF), no sitio propio
    - business.site
    - negocio.site
    - wixsite.com
    - sites.google.com
    - canva.site
    - my.canva.site
    - godaddysites.com
    - jimdosite.com
    - mystrikingly.com
    - weebly.com

  # Acortadores que esconden el destino (ADR-003): resolver el redirect antes de clasificar.
  url_shorteners:
    - bit.ly
    - cutt.ly
    - goo.gl
    - t.co
    - ow.ly
    - tinyurl.com

  # Tipos de Places que marcan pos_candidate = true (ADR-004): rubros donde un POS
  # es candidato natural. La heurística pre-filtra a quién preguntar; el dato manual
  # (pos_status) manda sobre esta columna.
  pos_candidate_types:
    - restaurant
    - meal_takeaway
    - meal_delivery
    - cafe
    - bakery
    - bar
    - convenience_store
    - liquor_store
    - supermarket
    - grocery_store
    - pharmacy
    - drugstore
    - food_store
    - butcher_shop

  # Pesos del lead_score (ADR-008): log(1 + user_rating_count) * peso_presencia * bonus_pos.
  # Hipótesis inicial; se calibra con la evidencia de los primeros contactos.
  lead_score:
    presence_weights:
      sin_presencia: 1.0
      solo_redes: 0.8
      web_caida: 0.9
      web_propia: 0.0
    pos_candidate_bonus: 1.25

  # Ventana de retención de datos de Places en días (ADR-006). Verificado 2026-07-07: 30 días.
  places_retention_days: 30

  # Cupo mensual gratuito del SKU más restrictivo (Enterprise) — AUD-003, verificado 2026-07-07.
  # La página de salud alerta al acercarse. El driver #2 manda: jamás pasar a facturación.
  places_monthly_quota: 1000
